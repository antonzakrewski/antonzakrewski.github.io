<h1 class="title">cofinite subset</h1>
<div id="outline-container-orgafd1c93" class="outline-2">
<h2 id="orgafd1c93"><span class="section-number-2">1.</span> Definition</h2>
<div class="outline-text-2" id="text-1">
<p>
Let \(M\) be a <a href="20211008171333-menge.html#ID-30e3fc7a-7374-41d5-80da-a1dae2add239">set</a> and \(S \subseteq M\) a <a href="20211226213416-teilmenge.html#ID-6a977d06-68e6-4711-b15a-ce63378d53a8">subset</a>.
Then \(S\) is said be cofinite, if the <a href="20211227205752-komplement_mengenlehre.html#ID-76b857a4-da6d-4333-b837-cc1009f534e2">complement</a> 
</p>
\begin{align*}
M \setminus S
\end{align*}
<p>
is <a href="20211227215929-endliche_menge.html#ID-53523a13-c374-4332-a2d9-c49f03558e4d">finite</a> 
</p>
