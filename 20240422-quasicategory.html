<h1 class="title">quasicategory</h1>

<h2 id="org4a26e57"><span class="section-number-2">1.</span> Definition</h2>
<div class="outline-text-2" id="text-1">
<p>
Let <img src="ltximg/20240422-quasicategory_e176bcf0f1654de0d0bbd3f299eee3cb873d2ae8.svg" alt="20240422-quasicategory_e176bcf0f1654de0d0bbd3f299eee3cb873d2ae8.svg" class="org-svg" /> be a <a href="20240128-simplicial_set.html#ID-43a75466-c729-429a-a459-56f226b81262">simplicial set</a>.
Then <img src="ltximg/20240422-quasicategory_e176bcf0f1654de0d0bbd3f299eee3cb873d2ae8.svg" alt="20240422-quasicategory_e176bcf0f1654de0d0bbd3f299eee3cb873d2ae8.svg" class="org-svg" /> is said to be a quasi category, if every <a href="20240128-inner_horn.html#ID-9f3066a1-77af-4de4-b1f9-331f8aa919e8">inner horn</a> inclusion <img src="ltximg/20240422-quasicategory_a91eabdeb1172827a0c60e8d82338f5fd78f8d2b.svg" alt="20240422-quasicategory_a91eabdeb1172827a0c60e8d82338f5fd78f8d2b.svg" class="org-svg" /> 
</p>

<div class="equation-container">
<span class="equation">
<img src="ltximg/20240422-quasicategory_798d09d3c8d7498c1d58ce7aa861f99774c95e16.svg" alt="20240422-quasicategory_798d09d3c8d7498c1d58ce7aa861f99774c95e16.svg" class="org-svg" />
</span>
</div>
<p>
admits an extension for <img src="ltximg/20240422-quasicategory_4e8e15bed4163618ca19a32f46bf19b61d5ff319.svg" alt="20240422-quasicategory_4e8e15bed4163618ca19a32f46bf19b61d5ff319.svg" class="org-svg" />.
</p>

<p>
Note that this does not have to be unique.
</p>
