<h1 class="title">homotopy fibre sequence</h1>
<div id="outline-container-org3740dec" class="outline-2">
<h2 id="org3740dec"><span class="section-number-2">1.</span> Definition</h2>
<div class="outline-text-2" id="text-1">
<p>

</p>

</span>
</div>

<p>
together with a <a href="20240611-nullhomotopy.html#ID-534ed1c1-cf15-4b20-b9ed-2b4015157dba">nullhomotopy</a> of <img src="ltximg/20240704-homotopy_fibre_sequence_401d4408279faf461df237f97d5515d03ab052eb.svg" alt="20240704-homotopy_fibre_sequence_401d4408279faf461df237f97d5515d03ab052eb.svg" class="org-svg" /> to a constant map with value <img src="ltximg/20240704-homotopy_fibre_sequence_2282c31b5ee41f00d4ef26d4bbf60c4bb1024699.svg" alt="20240704-homotopy_fibre_sequence_2282c31b5ee41f00d4ef26d4bbf60c4bb1024699.svg" class="org-svg" /> such that the induced map
</p>
