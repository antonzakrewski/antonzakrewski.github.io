<h1 class="title">regular epimorphism</h1>

<h2 id="org069d499"><span class="section-number-2">1.</span> Definition</h2>
<div class="outline-text-2" id="text-1">
<p>
Let <img src="ltximg/20231215-regular_epimorphism_702b08e558a9c2c6c72d40d4c2f075974e4741f2.svg" alt="20231215-regular_epimorphism_702b08e558a9c2c6c72d40d4c2f075974e4741f2.svg" class="org-svg" /> be a <a href="20220816130308-kategorie_mathe.html#ID-3d36aefb-cedf-48b8-8031-adac2a4f2d3d">category</a> and <img src="ltximg/20231215-regular_epimorphism_f06f1a3630deb3f784a707ad2f2013dc69512a75.svg" alt="20231215-regular_epimorphism_f06f1a3630deb3f784a707ad2f2013dc69512a75.svg" class="org-svg" /> <a href="20220818170642-objekt_kategorie.html#ID-69e99ef2-fd8e-4268-a03a-b4a4f2c3cd74">objects</a>.
</p>

<p>
A regular epimoprhism is a <a href="20220817164827-morphismus.html#ID-7e72e390-edd9-4dec-a7cc-f04d2c37dcbc">morphism</a>
</p>

</span>
</div>
<p>

</p>
