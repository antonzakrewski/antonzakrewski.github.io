<h1 class="title">weakly hausdorff space</h1>
<div id="outline-container-org114616e" class="outline-2">
<h2 id="org114616e"><span class="section-number-2">1.</span> Definition</h2>
<div class="outline-text-2" id="text-1">
<p>
Let \((X, \mathcal{T})\) be a <a href="20220930231339-topologischer_raum.html#ID-86282c25-e748-45cd-bb85-553fdd7415f4">topological space</a>.
Then \(X\) is said to be weakly hausdorff, if every <a href="20230112104451-stetigkeit_topologie.html#ID-f46120aa-e40b-4c09-9296-23b0783092a2">continuous</a> map from a <a href="20230412003456-compact_set.html#ID-d09ae6d2-2b5c-41c1-a54d-3259d3e2f0f0">compact</a> <a href="20221122074811-hausdorff_raum.html#ID-f49f9b47-9f16-456f-837f-7b9656c46aba">hausdorff</a> space is a <a href="20230227190123-abgeschlossene_abbildung_topologie.html#ID-007193f7-4fbb-4a0b-9e26-1bd7c7dcb6c3">closed map</a> 
</p>
