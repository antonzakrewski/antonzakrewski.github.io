<h1 class="title">homological functor</h1>

<h2 id="org630db67"><span class="section-number-2">1.</span> Definition</h2>
<div class="outline-text-2" id="text-1">
<p>
Let <img src="ltximg/20240611-homological_functor_929ed02c89a849a5a13b92f5073678104d2cd54d.svg" alt="20240611-homological_functor_929ed02c89a849a5a13b92f5073678104d2cd54d.svg" class="org-svg" /> be an <a href="20230827-abelian_category.html#ID-9003af72-f684-4897-b096-c1d8a681c624">abelian category</a> and <img src="ltximg/20240611-homological_functor_e89c2eae22464bb912984737e97ed81b4efd090f.svg" alt="20240611-homological_functor_e89c2eae22464bb912984737e97ed81b4efd090f.svg" class="org-svg" /> a <a href="20240611-pre_triangulated_category.html#ID-a61d8b15-70b4-4bf3-aa11-7cebeb6d189e">pre-triangulated category</a>.
Then a <a href="20220821181056-funktor_kategorie.html#ID-31c2e5e6-98c4-4ed8-be83-5d7dafaa12d2">functor</a> <img src="ltximg/20240611-homological_functor_19116d016b4fe589bdeb7e0bf246c947bc22a1fc.svg" alt="20240611-homological_functor_19116d016b4fe589bdeb7e0bf246c947bc22a1fc.svg" class="org-svg" /> is said to be homological, if each <a href="20240605-exact_triangle.html#ID-d8f38123-2242-46a3-b1cf-f14b9f4abd0a">exact triangle</a> 
</p>
