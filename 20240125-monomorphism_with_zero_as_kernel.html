<div id="outline-container-orgbec2d8f" class="outline-2">
<h2 id="orgbec2d8f"><span class="section-number-2">1.</span> Proposition</h2>
<div class="outline-text-2" id="text-1">
<p>
Let \(\mathcal{C}\) be a <a href="20231215-pointed_category.html#ID-0783589b-3d52-46d9-a7ad-fb1c3130a223">pointed</a> <a href="20220816130308-kategorie_mathe.html#ID-3d36aefb-cedf-48b8-8031-adac2a4f2d3d">category</a> and \(f: X \rightarrow Y\) a <a href="20220819135911-monomorphismus.html#ID-60b63797-32fa-4d4e-a577-7616faa010ba">monomorphism</a>.
