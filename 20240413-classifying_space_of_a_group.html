<h1 class="title">classifying space of a group</h1>
<div id="outline-container-orgd46678d" class="outline-2">
<h2 id="orgd46678d"><span class="section-number-2">1.</span> Definition</h2>
<div class="outline-text-2" id="text-1">
<p>
Let \(G\) be a <a href="20220723085230-gruppe_mathe.html#ID-b6023bc8-458a-44e4-982a-6623378f4b4f">group</a>.
then the classifying space \(BG\) is the <a href="20240129-geometric_realization_of_a_simplicial_set.html#ID-dd7fca72-80cd-4b4b-a63f-1ff75e2bccd0">geometric realization</a> of the <a href="20240129-nerve_of_a_category.html#ID-753bb512-d7c2-4f44-bf03-2ade251eaa72">nerve</a> of the <a href="20231129-categorification_of_a_group.html#ID-c7faea82-4f52-40a5-8a9e-7e15c6f45811">categorification of a group</a>.
</p>
