<h1 class="title">tensor product of finite type algebras as finite type algebra</h1>
<div id="outline-container-org9e6ace9" class="outline-2">
<h2 id="org9e6ace9"><span class="section-number-2">1.</span> Proposition</h2>
<div class="outline-text-2" id="text-1">
<p>
Let \(A\) be a <a href="20221210204906-kommutativer_ring.html#ID-b92b4078-28f6-4371-87ba-aa9b950ff823">commutative</a>  <a href="20220920130524-ring_algebra.html#ID-ac7d56fc-0f56-4037-9010-38c358f79490">ring</a> and \(B,C\) <a href="20230731-finitely_generated_a_algebra.html#ID-20861333-797d-4ab1-9ad5-375661f357fc">finite type</a> <a href="20230722-a_algebra.html#ID-c3ba0b73-5545-48cc-9e90-81fda7909b5f">A-Algebra</a>.
Then the <a href="20240603-tensor_product_of_algebras.html#ID-066ddf5f-3a81-46c3-9ffe-e66abddb218a">tensor product of Algebras</a> is also a finite type algebra
