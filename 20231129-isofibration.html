<div class="outline-text-2" id="text-1">
<p>
Let <img src="ltximg/20231129-isofibration_f726a0912316796275a8c0da58d35bfaa027868b.svg" alt="20231129-isofibration_f726a0912316796275a8c0da58d35bfaa027868b.svg" class="org-svg" /> be <a href="20220816130308-kategorie_mathe.html#ID-3d36aefb-cedf-48b8-8031-adac2a4f2d3d">categories</a>
</p>

<p>
A <a href="20220821181056-funktor_kategorie.html#ID-31c2e5e6-98c4-4ed8-be83-5d7dafaa12d2">functor</a> <img src="ltximg/20231129-isofibration_e72c119b9f02f45993cc7e1b8639ad9883fe5d8c.svg" alt="20231129-isofibration_e72c119b9f02f45993cc7e1b8639ad9883fe5d8c.svg" class="org-svg" /> is called an isofibration, if for <a href="20220818170642-objekt_kategorie.html#ID-69e99ef2-fd8e-4268-a03a-b4a4f2c3cd74">objects</a> <img src="ltximg/20231129-isofibration_5db18c9fc00ff12a2a4e0081ed9cb670b6501c01.svg" alt="20231129-isofibration_5db18c9fc00ff12a2a4e0081ed9cb670b6501c01.svg" class="org-svg" /> and an <a href="20220817230532-isomorphismus_kategorientheorie.html#ID-8f539991-82c2-4cb3-a303-965a60282db5">isomorphism</a> <img src="ltximg/20231129-isofibration_074de3f4d8792dd66fbd8d23d2c73c9038a6c769.svg" alt="20231129-isofibration_074de3f4d8792dd66fbd8d23d2c73c9038a6c769.svg" class="org-svg" /> there exists a <a href="20231124-lifting_property.html#ID-0fea5bcb-a343-423f-87da-5d4426d2bf9b">lift</a>, i.e some object <img src="ltximg/20231129-isofibration_3bb0d9d300dcab7c759ffff5a8e360bb6403d8df.svg" alt="20231129-isofibration_3bb0d9d300dcab7c759ffff5a8e360bb6403d8df.svg" class="org-svg" /> and an isomorphism <img src="ltximg/20231129-isofibration_7fdaa443ad8bf9b8a110db5cfdaa06f689e3aec3.svg" alt="20231129-isofibration_7fdaa443ad8bf9b8a110db5cfdaa06f689e3aec3.svg" class="org-svg" />
</p>
