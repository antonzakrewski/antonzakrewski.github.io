<h2 id="orgb51cfdb"><span class="section-number-2">1.</span> Definition</h2>
<div class="outline-text-2" id="text-1">
<p>
Let <img src="ltximg/20231129-isofibration_1e6c5f6d3e7f0a94d5c40b6390f4689b264fe4d2.svg" alt="20231129-isofibration_1e6c5f6d3e7f0a94d5c40b6390f4689b264fe4d2.svg" class="org-svg" /> be <a href="20220816130308-kategorie_mathe.html#ID-3d36aefb-cedf-48b8-8031-adac2a4f2d3d">categories</a>
</p>

<p>
A <a href="20220821181056-funktor_kategorie.html#ID-31c2e5e6-98c4-4ed8-be83-5d7dafaa12d2">functor</a> <img src="ltximg/20231129-isofibration_e9e921c9b5916f51145ac3b197fcec9571fc6709.svg" alt="20231129-isofibration_e9e921c9b5916f51145ac3b197fcec9571fc6709.svg" class="org-svg" /> is called an isofibration, if for <a href="20220818170642-objekt_kategorie.html#ID-69e99ef2-fd8e-4268-a03a-b4a4f2c3cd74">objects</a> <img src="ltximg/20231129-isofibration_04c690c7a18dd8aae9d2967dd117e5c2cc8619f8.svg" alt="20231129-isofibration_04c690c7a18dd8aae9d2967dd117e5c2cc8619f8.svg" class="org-svg" /> and an <a href="20220817230532-isomorphismus_kategorientheorie.html#ID-8f539991-82c2-4cb3-a303-965a60282db5">isomorphism</a> <img src="ltximg/20231129-isofibration_fdcbea5702c3cdf416fb9dde2965df5d34667276.svg" alt="20231129-isofibration_fdcbea5702c3cdf416fb9dde2965df5d34667276.svg" class="org-svg" /> there exists a <a href="20231124-lifting_property.html#ID-0fea5bcb-a343-423f-87da-5d4426d2bf9b">lift</a>, i.e some object <img src="ltximg/20231129-isofibration_db5a1b938c2eb4f66b1279d6ba75e782b741770b.svg" alt="20231129-isofibration_db5a1b938c2eb4f66b1279d6ba75e782b741770b.svg" class="org-svg" /> and an isomorphism <img src="ltximg/20231129-isofibration_14460b1b4d03dc3e7b808d0a360f615decc1adcf.svg" alt="20231129-isofibration_14460b1b4d03dc3e7b808d0a360f615decc1adcf.svg" class="org-svg" />
</p>
