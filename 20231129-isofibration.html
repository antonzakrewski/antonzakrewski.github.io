<div class="outline-text-2" id="text-1">
<p>
Let <img src="file:///home/anton/html/ltximg/20231129-isofibration_466e24868dd3549e8eecb17af6cf5ae6ce3aacf6.svg" alt="20231129-isofibration_466e24868dd3549e8eecb17af6cf5ae6ce3aacf6.svg" class="org-svg" /> be <a href="20220816130308-kategorie_mathe.html#ID-3d36aefb-cedf-48b8-8031-adac2a4f2d3d">categories</a>
</p>

<p>
A <a href="20220821181056-funktor_kategorie.html#ID-31c2e5e6-98c4-4ed8-be83-5d7dafaa12d2">functor</a> <img src="file:///home/anton/html/ltximg/20231129-isofibration_685807f008bf893abc785ecded5881ef0d2c352f.svg" alt="20231129-isofibration_685807f008bf893abc785ecded5881ef0d2c352f.svg" class="org-svg" /> is called an isofibration, if for <a href="20220818170642-objekt_kategorie.html#ID-69e99ef2-fd8e-4268-a03a-b4a4f2c3cd74">objects</a> <img src="file:///home/anton/html/ltximg/20231129-isofibration_6183b1402a61a387bc92f33d77d34a1fdd44bca4.svg" alt="20231129-isofibration_6183b1402a61a387bc92f33d77d34a1fdd44bca4.svg" class="org-svg" /> and an <a href="20220817230532-isomorphismus_kategorientheorie.html#ID-8f539991-82c2-4cb3-a303-965a60282db5">isomorphism</a> <img src="file:///home/anton/html/ltximg/20231129-isofibration_bf51808cf06cf0973635f4cb68743b87289b42d9.svg" alt="20231129-isofibration_bf51808cf06cf0973635f4cb68743b87289b42d9.svg" class="org-svg" /> there exists a <a href="20231124-lifting_property.html#ID-0fea5bcb-a343-423f-87da-5d4426d2bf9b">lift</a>, i.e some object <img src="file:///home/anton/html/ltximg/20231129-isofibration_6c2eef2f30bf55c5b3a3e52a9579abffde8b67b4.svg" alt="20231129-isofibration_6c2eef2f30bf55c5b3a3e52a9579abffde8b67b4.svg" class="org-svg" /> and an isomorphism <img src="file:///home/anton/html/ltximg/20231129-isofibration_44665b28cf33cb17f3fa38f3e05f2bcc951223a8.svg" alt="20231129-isofibration_44665b28cf33cb17f3fa38f3e05f2bcc951223a8.svg" class="org-svg" />
</p>
