<h1 class="title">covariant right exact functor</h1>
<div id="outline-container-orga2d1ab5" class="outline-2">
<h2 id="orga2d1ab5"><span class="section-number-2">1.</span> Definition</h2>
<div class="outline-text-2" id="text-1">
<p>
Let <img src="file:///home/anton/html/ltximg/20230903-right_exact_functor_8b9634e4256703ca94659418b154ef093913d6be.svg" alt="20230903-right_exact_functor_8b9634e4256703ca94659418b154ef093913d6be.svg" class="org-svg" /> be <a href="20230827-abelian_category.html#ID-9003af72-f684-4897-b096-c1d8a681c624">abelian</a> <a href="20220816130308-kategorie_mathe.html#ID-3d36aefb-cedf-48b8-8031-adac2a4f2d3d">categories</a> and <img src="file:///home/anton/html/ltximg/20230903-right_exact_functor_2e2e2530e0b65373c8890b4c8f663ab1d8f90ec7.svg" alt="20230903-right_exact_functor_2e2e2530e0b65373c8890b4c8f663ab1d8f90ec7.svg" class="org-svg" /> an <a href="20220830173246-kovarianter_funktor.html#ID-c5286004-d249-4969-86d5-c75655b7f5d3">covariant</a> <a href="20230827-additive_functor.html#ID-194ea42e-600c-4119-8889-5b46998201e6">additive functor</a>.

</p>
