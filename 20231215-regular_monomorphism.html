<h1 class="title">regular monomorphism</h1>
<div id="outline-container-org3e4debf" class="outline-2">
<h2 id="org3e4debf"><span class="section-number-2">1.</span> Definition</h2>
<div class="outline-text-2" id="text-1">
<p>
Let <img src="file:///home/anton/html/ltximg/20231215-regular_monomorphism_f0977141adcf1f0492fc71b50e1cb7480d0de097.svg" alt="20231215-regular_monomorphism_f0977141adcf1f0492fc71b50e1cb7480d0de097.svg" class="org-svg" /> be a <a href="20220816130308-kategorie_mathe.html#ID-3d36aefb-cedf-48b8-8031-adac2a4f2d3d">category</a> and <img src="file:///home/anton/html/ltximg/20231215-regular_monomorphism_91f2c4b6facf8d196529725d84a9cebaea406e4d.svg" alt="20231215-regular_monomorphism_91f2c4b6facf8d196529725d84a9cebaea406e4d.svg" class="org-svg" /> <a href="20220818170642-objekt_kategorie.html#ID-69e99ef2-fd8e-4268-a03a-b4a4f2c3cd74">objects</a>.
</p>

<p>
A regular monomorphism is a <a href="20220817164827-morphismus.html#ID-7e72e390-edd9-4dec-a7cc-f04d2c37dcbc">morphism</a>
</p>

<div class="equation-container">
<span class="equation">
<img src="file:///home/anton/html/ltximg/20231215-regular_monomorphism_d010e7313ecef3648315e26c33763816b215ec46.svg" alt="20231215-regular_monomorphism_d010e7313ecef3648315e26c33763816b215ec46.svg" class="org-svg" />
</span>
</div>
<p>
such that <img src="file:///home/anton/html/ltximg/20231215-regular_monomorphism_8f69c826ded050db440bbf495fdeb1407040c16a.svg" alt="20231215-regular_monomorphism_8f69c826ded050db440bbf495fdeb1407040c16a.svg" class="org-svg" /> with <img src="file:///home/anton/html/ltximg/20231215-regular_monomorphism_34471cba0500c9dffd79203f9aac2fceed2fe684.svg" alt="20231215-regular_monomorphism_34471cba0500c9dffd79203f9aac2fceed2fe684.svg" class="org-svg" /> is a <a href="20230804-equalizer.html#ID-b6f325ea-2d24-43be-977b-2981baad9524">equalizer</a>, i.e. there exist some <img src="file:///home/anton/html/ltximg/20231215-regular_monomorphism_fa9d34244efd4c315314b2656d8ad55c7569e9e9.svg" alt="20231215-regular_monomorphism_fa9d34244efd4c315314b2656d8ad55c7569e9e9.svg" class="org-svg" /> and <a href="20220817164827-morphismus.html#ID-7e72e390-edd9-4dec-a7cc-f04d2c37dcbc">morphisms</a> <img src="file:///home/anton/html/ltximg/20231215-regular_monomorphism_d9819fd9f4db1b66513d466213585fddcb26850f.svg" alt="20231215-regular_monomorphism_d9819fd9f4db1b66513d466213585fddcb26850f.svg" class="org-svg" /> such that
</p>

<span class="equation">
<img src="file:///home/anton/html/ltximg/20231215-regular_monomorphism_afcdac31b965e0c436d51599b8066428f9cea6f4.svg" alt="20231215-regular_monomorphism_afcdac31b965e0c436d51599b8066428f9cea6f4.svg" class="org-svg" />

<p>
is universal
