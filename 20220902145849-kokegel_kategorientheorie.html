<h1 class="title">Cocone</h1>
<div id="outline-container-org2243be8" class="outline-2">
<h2 id="org2243be8"><span class="section-number-2">1.</span> Definition</h2>
<div class="outline-text-2" id="text-1">
<p>
A Cocone is a <a href="20220821184957-kegel_kategorientheorie.html#ID-6a4a3003-6d34-434d-a743-fa5d5caed3ef">cone</a> in the <a href="20220830192239-duale_kategorie.html#ID-711d7a6e-e765-4a59-90a2-baeee955dea1">opposite category</a> 
</p>
</div>
</div>

<p>
