<h2 id="org57d4933"><span class="section-number-2">1.</span> Definition</h2>
<div class="outline-text-2" id="text-1">
<p>
Let <img src="ltximg/20230403183725-arrow_category_fe5cbd4c7d32de3c570361839e875bf39db326b7.svg" alt="20230403183725-arrow_category_fe5cbd4c7d32de3c570361839e875bf39db326b7.svg" class="org-svg" /> be a <a href="20220816130308-kategorie_mathe.html#ID-3d36aefb-cedf-48b8-8031-adac2a4f2d3d">category</a>.
Then the Arrow Cateogry <img src="ltximg/20230403183725-arrow_category_a8bf90aaeafdaee91704286b0305861b85e67e0b.svg" alt="20230403183725-arrow_category_a8bf90aaeafdaee91704286b0305861b85e67e0b.svg" class="org-svg" /> is the <a href="20220816130308-kategorie_mathe.html#ID-3d36aefb-cedf-48b8-8031-adac2a4f2d3d">category</a> with <a href="20220817164827-morphismus.html#ID-7e72e390-edd9-4dec-a7cc-f04d2c37dcbc">morphisms</a> of <img src="ltximg/20230403183725-arrow_category_fe5cbd4c7d32de3c570361839e875bf39db326b7.svg" alt="20230403183725-arrow_category_fe5cbd4c7d32de3c570361839e875bf39db326b7.svg" class="org-svg" /> as <a href="20220818170642-objekt_kategorie.html#ID-69e99ef2-fd8e-4268-a03a-b4a4f2c3cd74">objects</a>.
The <a href="20220817164827-morphismus.html#ID-7e72e390-edd9-4dec-a7cc-f04d2c37dcbc">morphisms</a> between <a href="20220818170642-objekt_kategorie.html#ID-69e99ef2-fd8e-4268-a03a-b4a4f2c3cd74">objects</a> in the arrow category <img src="ltximg/20230403183725-arrow_category_2d0ef5c9996125de5fcb20455288edaff46b524d.svg" alt="20230403183725-arrow_category_2d0ef5c9996125de5fcb20455288edaff46b524d.svg" class="org-svg" /> is a pair of <a href="20220817164827-morphismus.html#ID-7e72e390-edd9-4dec-a7cc-f04d2c37dcbc">morphisms</a> <img src="ltximg/20230403183725-arrow_category_e323aa4e3231f9187427b842d55f5c8b4189036a.svg" alt="20230403183725-arrow_category_e323aa4e3231f9187427b842d55f5c8b4189036a.svg" class="org-svg" /> such that following <a href="20220824224824-kommutierendes_diagramm.html#ID-968cc45b-2492-4495-b9e3-261866c0901d">diagramm commutes</a>
