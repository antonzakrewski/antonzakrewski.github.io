<h1 class="title">sphere as closed manifold</h1>
<div id="outline-container-orge979e57" class="outline-2">
<h2 id="orge979e57"><span class="section-number-2">1.</span> Proposition</h2>
<div class="outline-text-2" id="text-1">
<p>
The <a href="20230413003915-einheitssphare.html#ID-5ad34a63-284c-4eec-919d-9a5a67d6b1ee">n-sphere</a> is a <a href="20240606-closed_topological_manifold.html#ID-e5619774-ee4d-40ce-ba8a-b98f23ddb7f2">closed topological manifold</a>
</p>
</div>
</div>
<div id="outline-container-org71e9a23" class="outline-2">
<h2 id="org71e9a23"><span class="section-number-2">2.</span> Proof</h2>
<div class="outline-text-2" id="text-2">
<ol class="org-ol">
<li>the sphere is by definition bounded.</li>
<li>furthermore it is closed</li>
<li>hence it is compact (cf. <a href="20231025-euklidischer_raum_als_eigentlicher_raum.html#ID-4a9304dd-aa25-42be-8c7b-427df70257d9">compact sets in euclidean spaces</a>)</li>
</ol>
