<h1 class="title">regular element</h1>
<div id="outline-container-org8428a7a" class="outline-2">
<h2 id="org8428a7a"><span class="section-number-2">1.</span> Definition</h2>
<div class="outline-text-2" id="text-1">
<p>
Let \(A\) be a <a href="20220920130524-ring_algebra.html#ID-ac7d56fc-0f56-4037-9010-38c358f79490">ring</a>.
Then an element \(a \in A\) is said to be regular, if it
</p>
<ol class="org-ol">
<li>nonzero</li>
<li>not a <a href="20240611-left_zero_divisor.html#ID-4c06b32b-969f-4fd2-9724-94beac26ea57">left zero divisor</a></li>
<li>not a  <a href="20240611-right_zero_divisor.html#ID-e0f1ceba-b20b-486c-8c5d-3a0883f01337">right zero divisor</a></li>
</ol>

<p>
see:
</p>

<li><a href="20221226125328-nullteiler.html#ID-dc985755-3df5-4b03-929e-659ee65ad000">zero divisor</a></li>
</ul>
